---
- name: Install Hashicorp dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present

- name: Add Hashicorp GPG key
  ansible.builtin.get_url:
    url: "https://apt.releases.hashicorp.com/gpg"
    dest: /etc/apt/keyrings/hashicorp.asc
    mode: '0644'

- name: Add Hashicorp repo
  ansible.builtin.apt_repository:
    repo: "{{ item }}"
  loop: 
    - "deb [signed-by=/etc/apt/keyrings/hashicorp.asc] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
    - "deb-src [signed-by=/etc/apt/keyrings/hashicorp.asc] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"

- name: Install Hashicorp tools
  ansible.builtin.apt:
    name: 
      - consul
      - nomad
    state: present

- name: Enable Hashicorp services
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: started
    enabled: true
    scope: system
  loop:
    - consul
    - nomad