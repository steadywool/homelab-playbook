---
- name: Template Nomad server configuration
  ansible.builtin.template:
    src: "nomad.d/server.hcl.j2"
    dest: "/etc/nomad.d/server.hcl"
    owner: nomad
    group: nomad
    mode: '0640'
  when: inventory_hostname in nomad_server
  tags: nomad

- name: Template Nomad client configuration
  ansible.builtin.template:
    src: "nomad.d/client.hcl.j2"
    dest: "/etc/nomad.d/client.hcl"
    owner: nomad
    group: nomad
    mode: '0640'
  when: inventory_hostname in nomad_client
  tags: nomad

- name: Create Nomad data directory
  ansible.builtin.file:
    path: "/var/lib/nomad"
    state: directory
    owner: nomad
    group: nomad
    mode: '0750'
  tags: nomad

- name: Reload Nomad service
  ansible.builtin.systemd_service:
    name: nomad.service
    state: reloaded
    scope: system
  tags: nomad