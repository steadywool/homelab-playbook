---
- name: Template Nomad configuration
  ansible.builtin.template:
    src: nomad.hcl.j2
    dest: "/etc/nomad.d/nomad.hcl"
    owner: nomad
    group: nomad
    mode: '0544'

- name: Create Nomad data directory
  ansible.builtin.file:
    path: "/var/lib/nomad"
    state: directory
    owner: nomad
    group: nomad
    mode: '0750'

- name: Reload Nomad service
  ansible.builtin.systemd_service:
    name: nomad.service
    state: reloaded
    scope: system