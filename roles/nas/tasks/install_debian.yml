---
- name: Install Samba packages
  ansible.builtin.apt:
    name:
      - samba
      - samba-vfs-modules
    state: present

- name: Enable Samba services
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: started
    enabled: true
    scope: system
  loop:
    - smbd.service
    - nmbd.service

- name: Install NFS packages
  ansible.builtin.apt:
    name:
      - nfs-kernel-server
    state: present

- name: Enable NFS service
  ansible.builtin.systemd_service:
    name: nfs-server.service
    state: started
    enabled: true
    scope: system