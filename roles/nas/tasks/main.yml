---
- name: Install Docker on Debian based OS
  ansible.builtin.import_tasks: install_debian.yml
  when: ansible_distribution in ["Ubuntu", "Debian"]
  tags: nas,debian

- name: Manage NAS users
  ansible.builtin.import_tasks: manage_users.yml
  tags: nas,users

- name: Configure Samba server
  ansible.builtin.import_tasks: configure_samba.yml
  tags: nas,samba

- name: Configure NFS server
  ansible.builtin.import_tasks: configure_nfs.yml
  tags: nas,nfs